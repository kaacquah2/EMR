services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./medsync-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Production startup: migrate + cache table only (no dev seeds).
    # Set ENV=production and all required secrets in .env.docker before deploying.
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py createcachetable --no-color &&
             python manage.py collectstatic --noinput &&
             gunicorn medsync_backend.wsgi --bind 0.0.0.0:8000 --workers 4 --timeout 120 --access-logfile -"

  frontend:
    build:
      context: ./medsync-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
