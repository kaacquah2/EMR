# MedSync production reverse proxy (TLS termination + static offload)
# Place behind cert-manager / Let's Encrypt. Adjust server_name and upstream ports.

upstream medsync_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream medsync_frontend {
    server 127.0.0.1:3000;
    keepalive 16;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name emr.example.gov.gh;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 25m;

    # Django collected static files (when served via nginx instead of WhiteNoise)
    location /static/ {
        alias /var/www/medsync/static/;
        expires 7d;
        access_log off;
    }

    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://medsync_backend;
        include /etc/nginx/proxy_params;
    }

    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://medsync_backend;
        include /etc/nginx/proxy_params;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /ws/ {
        proxy_pass http://medsync_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        include /etc/nginx/proxy_params;
    }

    location / {
        proxy_pass http://medsync_frontend;
        include /etc/nginx/proxy_params;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name emr.example.gov.gh;
    return 301 https://$host$request_uri;
}
