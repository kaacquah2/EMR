name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop, staging]
  pull_request:
    branches: [main, master, develop, staging]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for pre-filled emails in .env.example
        run: |
          if grep -q "admin@medsync.gh" medsync-backend/.env.example; then
            echo "Error: .env.example contains real-looking emails."
            exit 1
          fi
      - name: Check DEV_PERMISSION_BYPASS_EMAILS guard
        run: |
          # This test ensures that if someone tries to set bypass emails with DEBUG=False, the app fails
          cd medsync-backend
          pip install -r requirements-local.txt
          export DEBUG=False
          export SECRET_KEY=test-key
          export DEV_PERMISSION_BYPASS_EMAILS=test@example.com
          if python manage.py check 2>&1 | grep -q "CRITICAL SECURITY RISK"; then
            echo "Security guard is working."
          else
            echo "Error: Security guard failed to block bypass emails in production mode."
            exit 1
          fi
      - name: Scan Python packages for vulnerabilities (PyPA safety)
        run: |
          pip install safety
          safety check --full-report

  migration-linter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medsync-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-local.txt
      - name: Run migration linter
        run: python manage.py lintmigrations

  backend-ci:
    runs-on: ubuntu-latest
    needs: [security-check]
    defaults:
      run:
        working-directory: medsync-backend
    env:
      SECRET_KEY: "django-insecure-ci-test-key-replace-in-prod"
      DEBUG: "True"
      DATABASE_URL: "sqlite:///:memory:"
      FIELD_ENCRYPTION_KEY: "ci-test-encryption-key-32-chars-long-at-least"
      AUDIT_LOG_SIGNING_KEY: "ci-test-audit-signing-key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-local.txt
      - name: Pytest
        run: python -m pytest api/tests/ -q --tb=short
      - name: RBAC & Policy Checks
        run: |
          python manage.py test api.tests.test_rbac_coverage --verbosity=2 --keepdb
          python manage.py test api.tests.test_alert_policy --verbosity=2 --keepdb
          python manage.py test api.tests.test_phi_encryption --verbosity=2 --keepdb
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements-local.txt

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medsync-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: medsync-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
      - name: ESLint
        run: npm run lint
      - name: Next.js build
        run: npm run build
      - name: Vitest
        run: npm run test

  integration-tests:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
      - uses: actions/checkout@v4
      - name: Docker Compose Test
        run: |
          docker compose up -d
          # Wait for services to be healthy
          sleep 30
          docker compose ps
          # Basic check: backend is up
          curl -f http://localhost:8000/api/v1/health || exit 1
          docker compose down

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Deploy to Staging (Railway/Vercel Placeholder)
        run: |
          echo "Deploying to staging environment..."
          # Add actual deployment commands here (e.g., railway up, vercel deploy)

  deploy-production:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to Production (Railway/Vercel Placeholder)
        run: |
          echo "Deploying to production environment..."
          # Add actual deployment commands here
