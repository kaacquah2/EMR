# Reference CI: backend pytest + pip-audit; frontend lint + build + Vitest.
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medsync-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "**/requirements*.txt"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Pytest
        run: python -m pytest api/tests/ -q --tb=short
      - name: Check RBAC coverage parity
        run: python manage.py test api.tests.test_rbac_coverage --verbosity=2 --keepdb
      - name: Check alert policy consistency
        run: python manage.py test api.tests.test_alert_policy --verbosity=2 --keepdb
      - name: Check PHI field encryption
        run: python manage.py test api.tests.test_phi_encryption --verbosity=2 --keepdb
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: medsync-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: medsync-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: npm audit
        run: npm audit --audit-level=moderate
      - name: ESLint
        run: npm run lint
      - name: Next.js build
        run: npm run build
      - name: Vitest
        run: npm run test
