# Railway: monorepo — root requirements.txt (prod-only deps) + start.sh for Railpack.
# .dockerignore drops medsync-frontend/ etc. to speed copy/registry push (helps trial build limits).
#
# Required variables (service → Variables). DEBUG defaults to False; SECRET_KEY is mandatory.
#   SECRET_KEY            — random string, e.g. run locally: openssl rand -hex 32
#   DATABASE_URL          — Postgres (Railway plugin or Neon)
#   ALLOWED_HOSTS         — comma-separated, include your *.up.railway.app host and any custom domain
#   CORS_ALLOWED_ORIGINS  — comma-separated frontend origins (e.g. https://your-app.vercel.app)

[deploy]
startCommand = "bash start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
