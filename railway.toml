# Railway deployment manifest — MedSync backend
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "medsync-backend/Dockerfile"
watchPatterns = ["medsync-backend/**"]

[deploy]
startCommand = "gunicorn medsync_backend.wsgi --bind 0.0.0.0:$PORT --workers 4 --timeout 120"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1

# Run migrations before each deploy (Railway pre-deploy hook)
preDeployCommand = "python manage.py migrate --noinput"
