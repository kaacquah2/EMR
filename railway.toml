# Railway: monorepo — root requirements.txt (prod-only deps) + start.sh for Railpack.
# .dockerignore drops medsync-frontend/ etc. to speed copy/registry push (helps trial build limits).
# Configure DATABASE_URL, SECRET_KEY, ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS in the dashboard.

[deploy]
startCommand = "bash start.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
