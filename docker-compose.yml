services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-medsync}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.docker}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./medsync-backend
    volumes:
      - ./medsync-backend:/app
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-medsync}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # WSGI server — no Redis/Celery required.
    # The no-show cron (*/15 * * * *  python manage.py mark_no_shows) should be
    # configured on the host or in a lightweight cron container.
    command: gunicorn medsync_backend.wsgi --bind 0.0.0.0:8000 --workers 4 --timeout 120

  frontend:
    build:
      context: ./medsync-frontend
    volumes:
      - ./medsync-frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    command: npm run dev

volumes:
  postgres_data:
