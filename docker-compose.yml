services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-medsync}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.docker}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./medsync-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-medsync}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    # Run migrations and warm cache table before starting WSGI server.
    # The no-show cron (*/15 * * * *  python manage.py mark_no_shows) should be
    # configured on the host or in a lightweight cron container.
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py createcachetable --verbosity 0 &&
             gunicorn medsync_backend.wsgi --bind 0.0.0.0:8000 --workers 4 --timeout 120"

  frontend:
    build:
      context: ./medsync-frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
